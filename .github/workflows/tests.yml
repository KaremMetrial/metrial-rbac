name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['10.*', '11.*', '12.*', '13.*']
        exclude:
          - php: '8.2'
            laravel: '13.*'

    name: PHP ${{ php }} — Laravel ${{ laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ laravel }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run test suite
        run: vendor/bin/phpunit --testdox
